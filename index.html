<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sorting Visualizer</h1>

<div class="controls">
    <div class="control-group">
        <button id="newBtn" onclick="generateArray()">🔄 New Array</button>

        <select id="algorithm">
            <option value="bubble">Bubble Sort</option>
            <option value="selection">Selection Sort</option>
            <option value="insertion">Insertion Sort</option>
            <option value="quick">Quick Sort</option>
            <option value="merge">Merge Sort</option>
            <option value="heap">Heap Sort</option>
        </select>

        <button id="startBtn" onclick="startSort()">▶ Start</button>
        <button onclick="togglePause()">⏸ Pause</button>
        <button onclick="prevStep()">⏮ Prev</button>
        <button onclick="nextStep()">⏭ Next</button>
    </div>

    <div class="control-group">
        <label>Speed</label>
        <input type="range" id="speed" min="50" max="1000" value="750">
        
        <label>Size</label>
        <input type="range" id="size" min="5" max="50" value="20">

        <span class="divider">|</span>

        <input type="text" id="customInput" placeholder="Custom: 10, 50, 30" title="Enter comma-separated numbers">
        <button id="customBtn" onclick="setCustomArray()">Set Array</button>
    </div>
</div>

<div class="legend">
  <span style="color:#ef4444">■ Comparing</span>
  <span style="color:#eab308">■ Swapping</span>
  <span style="color:#22c55e">■ Sorted</span>
</div>

<div id="description"></div>

<div id="array"></div>

<div id="complexity"></div>

<script src="script.js"></script>
</body>
</html>
